services:
  - type: web
    name: myai-mobile
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: UPSTREAM_BASE_URL
        sync: false
      - key: UPSTREAM_PROVIDER
        value: openai_compatible
      - key: UPSTREAM_CHAT_PATH
        value: /v1/chat/completions
      - key: UPSTREAM_MODELS_PATH
        value: /v1/models
      - key: UPSTREAM_API_KEY_HEADER
        value: Authorization
      - key: UPSTREAM_API_KEY_PREFIX
        value: "Bearer "
      - key: UPSTREAM_API_KEY
        sync: false
      - key: ANTHROPIC_BASE_URL
        value: https://api.anthropic.com
      - key: ANTHROPIC_MESSAGES_PATH
        value: /v1/messages
      - key: ANTHROPIC_MODELS_PATH
        value: /v1/models
      - key: ANTHROPIC_VERSION
        value: "2023-06-01"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_BASE_URL
        value: https://generativelanguage.googleapis.com
      - key: GEMINI_GENERATE_PATH_TEMPLATE
        value: /v1beta/models/{model}:generateContent
      - key: GEMINI_MODELS_PATH
        value: /v1beta/models
      - key: GEMINI_API_KEY
        sync: false
      - key: ALLOWED_MODELS
        value: ""
      - key: ACCESS_TOKENS
        sync: false
      - key: ALLOWED_ORIGINS
        value: ""
      - key: RATE_LIMIT_PER_MIN
        value: "0"
      - key: MAX_BODY_SIZE_MB
        value: "100"
