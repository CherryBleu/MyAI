services:
  - type: web
    name: myai-mobile
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: UPSTREAM_BASE_URL
        sync: false
      - key: UPSTREAM_CHAT_PATH
        value: /v1/chat/completions
      - key: UPSTREAM_MODELS_PATH
        value: /v1/models
      - key: UPSTREAM_API_KEY
        sync: false
      - key: ALLOWED_MODELS
        value: ""
      - key: ACCESS_TOKENS
        sync: false
      - key: ALLOWED_ORIGINS
        value: ""
      - key: RATE_LIMIT_PER_MIN
        value: "0"
