<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1f4bd8" />
    <title>MyAI Mobile</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <style>
      :root {
        --bg: #f4f7ff;
        --bg-soft: #eff4ff;
        --card: rgba(255, 255, 255, 0.8);
        --text: #152448;
        --muted: #4f5e85;
        --primary: #1f4bd8;
        --primary-2: #17a2c9;
        --border: rgba(121, 146, 223, 0.25);
        --error: #b42318;
        --assistant-bg: #ffffff;
        --user-bg: #e8f2ff;
        --shadow: 0 18px 40px rgba(41, 72, 169, 0.14);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "MiSans", "HarmonyOS Sans SC", "PingFang SC", "Noto Sans CJK SC", "Segoe UI", sans-serif;
        background: linear-gradient(165deg, var(--bg) 0%, var(--bg-soft) 45%, #f9fcff 100%);
        color: var(--text);
        position: relative;
        overflow-x: hidden;
      }
      body::before,
      body::after {
        content: "";
        position: fixed;
        width: 260px;
        height: 260px;
        border-radius: 50%;
        filter: blur(18px);
        z-index: -1;
        opacity: 0.65;
        animation: floatOrb 8s ease-in-out infinite;
      }
      body::before {
        background: radial-gradient(circle, #c8d7ff 0%, rgba(200, 215, 255, 0) 70%);
        top: -80px;
        right: -70px;
      }
      body::after {
        background: radial-gradient(circle, #bbf0ff 0%, rgba(187, 240, 255, 0) 70%);
        bottom: -110px;
        left: -80px;
        animation-delay: -3s;
      }
      .app {
        min-height: 100dvh;
        max-width: 720px;
        margin: 0 auto;
        display: grid;
        grid-template-rows: auto auto 1fr auto;
        gap: 12px;
        padding: 14px 14px calc(14px + env(safe-area-inset-bottom));
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 12px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(8px);
      }
      .reveal {
        opacity: 0;
        transform: translateY(16px) scale(0.995);
        animation: riseIn 0.55s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      }
      .app > .reveal:nth-child(1) { animation-delay: 0.02s; }
      .app > .reveal:nth-child(2) { animation-delay: 0.08s; }
      .app > .reveal:nth-child(3) { animation-delay: 0.14s; }
      .app > .reveal:nth-child(4) { animation-delay: 0.2s; }
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .header h1 {
        margin: 0;
        font-size: clamp(18px, 4.4vw, 24px);
        letter-spacing: 0.15px;
        font-weight: 700;
      }
      .pill {
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 600;
        color: #1244cb;
        background: linear-gradient(135deg, #e6edff, #dff6ff);
        border: 1px solid rgba(31, 75, 216, 0.22);
      }
      .ghost-btn {
        border: 1px solid rgba(81, 110, 199, 0.32);
        background: rgba(255, 255, 255, 0.65);
        color: #3656a8;
        font-size: 13px;
        border-radius: 999px;
        padding: 8px 12px;
        transition: all 0.2s ease;
      }
      .ghost-btn:active {
        transform: translateY(1px);
        opacity: 0.88;
      }
      .config {
        display: grid;
        gap: 10px;
      }
      .row {
        display: grid;
        gap: 6px;
      }
      label {
        font-size: 11px;
        letter-spacing: 0.3px;
        text-transform: uppercase;
        font-weight: 600;
        color: var(--muted);
      }
      input, select, textarea {
        width: 100%;
        padding: 11px 12px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.92);
        font-size: 14px;
        color: var(--text);
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }
      input:focus, textarea:focus {
        outline: none;
        border-color: rgba(31, 75, 216, 0.5);
        box-shadow: 0 0 0 3px rgba(31, 75, 216, 0.12);
      }
      textarea {
        min-height: 88px;
        resize: vertical;
      }
      .chat {
        overflow: auto;
        display: grid;
        gap: 10px;
        align-content: start;
        min-height: 34vh;
      }
      .msg {
        padding: 12px;
        border-radius: 14px;
        border: 1px solid var(--border);
        white-space: pre-wrap;
        word-break: break-word;
        line-height: 1.55;
        font-size: 14px;
        position: relative;
        animation: popIn 0.24s ease;
      }
      .msg::before {
        content: attr(data-role);
        display: inline-block;
        margin-bottom: 6px;
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 0.25px;
      }
      .user {
        background: var(--user-bg);
        border-color: rgba(31, 75, 216, 0.22);
      }
      .assistant {
        background: var(--assistant-bg);
      }
      .msg-empty {
        text-align: center;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.65);
      }
      .composer {
        display: grid;
        gap: 10px;
      }
      .actions {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        align-items: center;
      }
      .btn {
        border: 0;
        border-radius: 12px;
        padding: 10px 14px;
        font-size: 14px;
        font-weight: 600;
        color: white;
        background: linear-gradient(135deg, var(--primary), var(--primary-2));
        box-shadow: 0 8px 20px rgba(31, 75, 216, 0.35);
        transition: transform 0.15s ease, filter 0.2s ease;
      }
      .btn:active {
        transform: translateY(1px);
      }
      .btn[disabled] {
        filter: grayscale(0.15);
        opacity: 0.8;
      }
      .btn.loading {
        position: relative;
        min-width: 78px;
      }
      .btn.loading::after {
        content: " ...";
        letter-spacing: 1px;
        animation: blink 1s steps(2, start) infinite;
      }
      .status {
        min-height: 18px;
        font-size: 12px;
        color: var(--muted);
        padding-left: 2px;
      }
      .hint {
        font-size: 12px;
        color: var(--muted);
      }
      .status.error { color: var(--error); }

      @keyframes riseIn {
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
      @keyframes popIn {
        from {
          opacity: 0;
          transform: translateY(7px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes floatOrb {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(12px); }
      }
      @keyframes blink {
        50% { opacity: 0.45; }
      }
      @media (max-width: 420px) {
        .header h1 { font-size: 18px; }
        .pill { padding: 3px 9px; }
      }
      @media (prefers-reduced-motion: reduce) {
        * {
          animation: none !important;
          transition: none !important;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="card header reveal">
        <div class="brand">
          <span class="pill">MyAI</span>
          <h1>Mobile Chat Studio</h1>
        </div>
        <button class="ghost-btn" id="clearBtn" type="button">清空会话</button>
      </section>

      <section class="card config reveal">
        <div class="row">
          <label for="apiBase">接口地址（默认当前域名）</label>
          <input id="apiBase" placeholder="https://your-domain.example" />
        </div>
        <div class="row">
          <label for="token">访问口令（不是上游 API Key）</label>
          <input id="token" type="password" placeholder="向你领取的口令" />
        </div>
        <div class="row">
          <label for="model">模型</label>
          <input id="model" list="modelOptions" placeholder="例如：gpt-4.1-mini" />
          <datalist id="modelOptions"></datalist>
          <div class="hint" id="modelHint">可手动输入模型名。</div>
        </div>
      </section>

      <section class="card chat reveal" id="chat"></section>

      <section class="card composer reveal">
        <div class="row">
          <label for="input">输入</label>
          <textarea id="input" placeholder="输入你想问的问题"></textarea>
        </div>
        <div class="actions">
          <div class="status" id="status"></div>
          <button class="btn" id="sendBtn" type="button">发送</button>
        </div>
      </section>
    </main>

    <script>
      const state = {
        messages: [],
        loading: false,
      };

      const els = {
        apiBase: document.getElementById("apiBase"),
        token: document.getElementById("token"),
        model: document.getElementById("model"),
        modelOptions: document.getElementById("modelOptions"),
        modelHint: document.getElementById("modelHint"),
        chat: document.getElementById("chat"),
        input: document.getElementById("input"),
        sendBtn: document.getElementById("sendBtn"),
        clearBtn: document.getElementById("clearBtn"),
        status: document.getElementById("status"),
      };

      init();

      async function init() {
        els.apiBase.value = localStorage.getItem("myai_api_base") || "";
        els.token.value = localStorage.getItem("myai_access_token") || "";
        els.model.value = localStorage.getItem("myai_model") || "";
        restoreMessages();
        renderMessages();
        attachEvents();
        await loadModels();
        if ("serviceWorker" in navigator) {
          try { await navigator.serviceWorker.register("/sw.js"); } catch {}
        }
      }

      function attachEvents() {
        els.sendBtn.addEventListener("click", onSend);
        els.clearBtn.addEventListener("click", onClear);
        els.apiBase.addEventListener("change", () => {
          localStorage.setItem("myai_api_base", els.apiBase.value.trim());
          loadModels();
        });
        els.token.addEventListener("change", () => {
          localStorage.setItem("myai_access_token", els.token.value.trim());
          loadModels();
        });
        els.model.addEventListener("change", () => {
          localStorage.setItem("myai_model", els.model.value.trim());
        });
        els.input.addEventListener("keydown", (e) => {
          if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            onSend();
          }
        });
      }

      function apiBase() {
        return (els.apiBase.value || "").trim() || location.origin;
      }

      async function loadModels() {
        setStatus("正在加载模型列表...");
        try {
          const resp = await fetch(`${apiBase()}/api/models`, {
            headers: tokenHeaders(),
          });
          const data = await resp.json();
          if (!resp.ok) throw new Error(data.error || "加载失败");
          els.modelOptions.innerHTML = "";
          const models = Array.isArray(data.models) ? data.models : [];
          for (const m of models) {
            const opt = document.createElement("option");
            opt.value = m;
            els.modelOptions.appendChild(opt);
          }
          if (!els.model.value && models.length) {
            els.model.value = models[0];
            localStorage.setItem("myai_model", els.model.value);
          }

          if (data.source === "allowlist") {
            els.modelHint.textContent = "当前为服务端白名单模式，仅可用列表内模型。";
          } else if (models.length) {
            els.modelHint.textContent = "已拉取上游模型列表，也可手动输入模型名。";
          } else {
            els.modelHint.textContent = "未拉取到模型列表，可手动输入模型名。";
          }

          if (els.model.value) {
            setStatus("模型已就绪。");
          } else {
            setStatus("请手动输入模型名后发送。");
          }
        } catch (e) {
          els.modelHint.textContent = "模型列表加载失败时，也可以手动输入模型名。";
          setStatus(`模型加载失败：${e.message}`, true);
        }
      }

      async function onSend() {
        if (state.loading) return;

        const content = els.input.value.trim();
        const selectedModel = els.model.value.trim();
        if (!content) return;
        if (!selectedModel) {
          setStatus("请先输入模型名。", true);
          return;
        }
        localStorage.setItem("myai_model", selectedModel);

        state.messages.push({ role: "user", content });
        els.input.value = "";
        saveMessages();
        renderMessages();

        state.loading = true;
        els.sendBtn.disabled = true;
        els.sendBtn.classList.add("loading");
        setStatus("思考中...");

        try {
          const resp = await fetch(`${apiBase()}/api/chat`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              ...tokenHeaders(),
            },
            body: JSON.stringify({
              model: selectedModel,
              messages: state.messages,
            }),
          });

          const data = await resp.json();
          if (!resp.ok) throw new Error(data.error || "请求失败");

          state.messages.push({ role: "assistant", content: data.content || "(空回复)" });
          saveMessages();
          renderMessages();
          setStatus("完成");
        } catch (e) {
          setStatus(`发送失败：${e.message}`, true);
        } finally {
          state.loading = false;
          els.sendBtn.disabled = false;
          els.sendBtn.classList.remove("loading");
        }
      }

      function onClear() {
        state.messages = [];
        saveMessages();
        renderMessages();
        setStatus("已清空会话。");
      }

      function tokenHeaders() {
        const token = (els.token.value || "").trim();
        return token ? { "X-Client-Token": token } : {};
      }

      function setStatus(text, isError = false) {
        els.status.textContent = text;
        els.status.classList.toggle("error", !!isError);
      }

      function renderMessages() {
        els.chat.innerHTML = "";
        if (!state.messages.length) {
          const empty = document.createElement("div");
          empty.className = "msg assistant msg-empty";
          empty.dataset.role = "系统";
          empty.textContent = "开始提问吧。";
          els.chat.appendChild(empty);
          return;
        }
        for (const msg of state.messages) {
          const div = document.createElement("div");
          div.className = `msg ${msg.role === "user" ? "user" : "assistant"}`;
          div.dataset.role = msg.role === "user" ? "你" : "AI";
          div.textContent = msg.content;
          els.chat.appendChild(div);
        }
        els.chat.scrollTop = els.chat.scrollHeight;
      }

      function saveMessages() {
        localStorage.setItem("myai_messages", JSON.stringify(state.messages.slice(-30)));
      }

      function restoreMessages() {
        try {
          const v = localStorage.getItem("myai_messages");
          state.messages = v ? JSON.parse(v) : [];
          if (!Array.isArray(state.messages)) state.messages = [];
        } catch {
          state.messages = [];
        }
      }
    </script>
  </body>
</html>
