<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f7f9fc" />
    <title>MyAI Mobile</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <style>
      :root {
        --bg: #f7f9fc;
        --surface: #ffffff;
        --surface-soft: #f3f6fb;
        --text: #1f2937;
        --muted: #667085;
        --line: #e4e7ec;
        --primary: #5a6af2;
        --primary-2: #63a5ff;
        --user-bubble: #dbe9ff;
        --assistant-bubble: #ffffff;
        --danger: #b42318;
        --shadow: 0 12px 28px rgba(16, 24, 40, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--text);
        background:
          radial-gradient(1200px 500px at 12% -15%, #e7eeff 0%, rgba(231, 238, 255, 0) 55%),
          radial-gradient(900px 520px at 110% 0%, #e5f2ff 0%, rgba(229, 242, 255, 0) 60%),
          var(--bg);
        font-family: "Google Sans", "Inter", "PingFang SC", "Segoe UI", sans-serif;
      }

      .auth-gate {
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 18px;
      }

      .auth-card {
        width: min(420px, 100%);
        border: 1px solid var(--line);
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: var(--shadow);
        backdrop-filter: blur(8px);
        padding: 18px;
        display: grid;
        gap: 12px;
      }

      .auth-card h2 {
        margin: 0;
        font-size: 20px;
      }

      .auth-error {
        min-height: 18px;
        font-size: 12px;
        color: var(--danger);
      }

      .app-hidden {
        display: none;
      }

      .app {
        min-height: 100dvh;
        max-width: 980px;
        margin: 0 auto;
        padding: 16px 14px calc(16px + env(safe-area-inset-bottom));
        display: grid;
        grid-template-rows: auto auto 1fr auto;
        gap: 12px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .logo-dot {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: linear-gradient(135deg, #4f8ef7, #6758ff);
        box-shadow: 0 0 0 6px rgba(90, 106, 242, 0.12);
      }

      .brand h1 {
        margin: 0;
        font-size: clamp(18px, 2.8vw, 22px);
        font-weight: 600;
      }

      .top-actions {
        display: flex;
        gap: 8px;
      }

      .chip-btn {
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.92);
        color: #344054;
        border-radius: 999px;
        padding: 8px 12px;
        font-size: 13px;
        transition: background 0.2s ease, border-color 0.2s ease;
      }

      .chip-btn:active {
        background: #eef2f8;
      }

      .settings {
        background: rgba(255, 255, 255, 0.8);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 12px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(8px);
        display: grid;
        gap: 10px;
        transform-origin: top;
        transition: max-height 0.25s ease, opacity 0.25s ease, padding 0.25s ease;
        max-height: 760px;
        opacity: 1;
      }

      .settings.collapsed {
        max-height: 0;
        opacity: 0;
        overflow: hidden;
        padding-top: 0;
        padding-bottom: 0;
        border-color: transparent;
      }

      .grid {
        display: grid;
        gap: 10px;
      }

      .row {
        display: grid;
        gap: 6px;
      }

      label {
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 0.3px;
        text-transform: uppercase;
        font-weight: 600;
      }

      input,
      textarea,
      select {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #fff;
        color: var(--text);
        font-size: 14px;
        padding: 10px 12px;
        outline: none;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }

      input:focus,
      textarea:focus,
      select:focus {
        border-color: #b8c2ff;
        box-shadow: 0 0 0 4px rgba(90, 106, 242, 0.12);
      }

      .hint {
        font-size: 12px;
        color: var(--muted);
      }

      .section-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .history-list {
        display: grid;
        gap: 8px;
        max-height: 180px;
        overflow: auto;
        padding-right: 2px;
      }

      .history-item {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #fff;
        padding: 8px 10px;
        text-align: left;
        display: grid;
        gap: 4px;
      }

      .history-item.active {
        border-color: #9eb4ff;
        background: #edf3ff;
      }

      .history-title {
        font-size: 13px;
        font-weight: 600;
        color: #344054;
      }

      .history-meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        font-size: 11px;
        color: var(--muted);
      }

      .model-table-wrap {
        border: 1px solid var(--line);
        border-radius: 12px;
        overflow: auto;
        max-height: 230px;
        background: #fff;
      }

      .model-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }

      .model-table th,
      .model-table td {
        padding: 8px 10px;
        border-bottom: 1px solid #eef1f6;
        text-align: left;
        vertical-align: middle;
      }

      .model-table th {
        position: sticky;
        top: 0;
        background: #f9fbff;
        z-index: 1;
        color: #667085;
        font-weight: 600;
      }

      .model-table tr:last-child td {
        border-bottom: 0;
      }

      .model-row {
        cursor: pointer;
      }

      .model-row.active {
        background: #ecf2ff;
      }

      .cap-list {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
      }

      .cap-chip {
        display: inline-block;
        border-radius: 999px;
        padding: 2px 6px;
        font-size: 10px;
        background: #eef2f8;
        color: #475467;
      }

      .chat-wrap {
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.82), rgba(255, 255, 255, 0.92));
        border: 1px solid var(--line);
        border-radius: 20px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(8px);
        display: grid;
        grid-template-rows: 1fr;
        min-height: 38vh;
      }

      .chat {
        overflow: auto;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .msg-row {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        width: 100%;
      }

      .msg-row.assistant {
        justify-content: flex-start;
      }

      .msg-row.user {
        justify-content: flex-end;
      }

      .msg-avatar {
        width: 28px;
        height: 28px;
        border-radius: 999px;
        border: 1px solid var(--line);
        display: grid;
        place-items: center;
        font-size: 11px;
        font-weight: 700;
        color: #344054;
        background: #fff;
        flex: 0 0 auto;
      }

      .msg-avatar.assistant {
        background: #eef4ff;
      }

      .msg-avatar.user {
        background: #dbe9ff;
      }

      .msg {
        max-width: min(760px, 82%);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 12px 14px;
        line-height: 1.55;
        font-size: 14px;
        white-space: pre-wrap;
        word-break: break-word;
        animation: fadeUp 0.2s ease;
      }

      .assistant {
        background: var(--assistant-bubble);
      }

      .user {
        background: var(--user-bubble);
        border-color: #bfd3ff;
      }

      .msg-empty {
        align-self: center;
        text-align: center;
        color: var(--muted);
        background: var(--surface-soft);
      }

      .composer {
        background: rgba(255, 255, 255, 0.86);
        border: 1px solid var(--line);
        border-radius: 18px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(8px);
        padding: 12px;
        display: grid;
        gap: 10px;
      }

      textarea {
        min-height: 92px;
        resize: vertical;
      }

      .attach-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .chip-btn.tiny {
        padding: 6px 10px;
        font-size: 12px;
      }

      .attach-list {
        display: grid;
        gap: 8px;
      }

      .attach-item {
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: center;
        gap: 10px;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 8px 10px;
        background: #fff;
      }

      .file-meta {
        min-width: 0;
      }

      .file-name {
        font-size: 13px;
        font-weight: 600;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .file-sub {
        color: var(--muted);
        font-size: 12px;
      }

      .file-remove {
        border: 0;
        border-radius: 10px;
        padding: 6px 10px;
        background: #fee4e2;
        color: #912018;
        font-size: 12px;
      }

      .preview-thumb {
        width: 48px;
        height: 48px;
        object-fit: cover;
        border-radius: 8px;
        border: 1px solid var(--line);
      }

      .preview-chip {
        min-width: 48px;
        height: 48px;
        border-radius: 8px;
        border: 1px solid var(--line);
        display: grid;
        place-items: center;
        font-size: 11px;
        color: var(--muted);
        background: var(--surface-soft);
        padding: 0 6px;
        text-align: center;
      }

      .msg-media {
        display: grid;
        gap: 8px;
      }

      .msg-media img {
        max-width: min(100%, 360px);
        max-height: 260px;
        border-radius: 10px;
        border: 1px solid var(--line);
      }

      .msg-media audio,
      .msg-media video {
        width: min(100%, 360px);
      }

      .file-link {
        display: inline-block;
        font-size: 12px;
        padding: 6px 8px;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: #175cd3;
        background: #f8fbff;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 10px;
      }

      .status {
        min-height: 18px;
        font-size: 12px;
        color: var(--muted);
      }

      .status.error {
        color: var(--danger);
      }

      .send-btn {
        border: 0;
        border-radius: 12px;
        padding: 10px 14px;
        color: white;
        font-size: 14px;
        font-weight: 600;
        background: linear-gradient(135deg, var(--primary), var(--primary-2));
        min-width: 88px;
        transition: transform 0.15s ease, opacity 0.15s ease;
      }

      .send-btn:active {
        transform: translateY(1px);
      }

      .send-btn[disabled] {
        opacity: 0.75;
      }

      .send-btn.loading::after {
        content: " ...";
        animation: blink 1s steps(2, start) infinite;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes blink {
        50% {
          opacity: 0.45;
        }
      }

      @media (min-width: 860px) {
        .grid {
          grid-template-columns: 1fr 1fr;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        * {
          animation: none !important;
          transition: none !important;
        }
      }
    </style>
  </head>
  <body>
    <section class="auth-gate" id="authGate">
      <div class="auth-card">
        <div class="brand">
          <span class="logo-dot" aria-hidden="true"></span>
          <h2>MyAI 访问验证</h2>
        </div>
        <div class="hint">请输入访问 token，验证通过后才能进入聊天页面。</div>
        <div class="row">
          <label for="authToken">访问口令</label>
          <input id="authToken" type="password" placeholder="输入访问 token" />
        </div>
        <button class="send-btn" id="authSubmit" type="button">进入页面</button>
        <div class="auth-error" id="authError"></div>
      </div>
    </section>

    <main class="app app-hidden" id="appShell">
      <header class="topbar">
        <div class="brand">
          <span class="logo-dot" aria-hidden="true"></span>
          <h1>MyAI</h1>
        </div>
        <div class="top-actions">
          <button class="chip-btn" id="settingsToggle" type="button">设置</button>
          <button class="chip-btn" id="newChatBtn" type="button">新建</button>
          <button class="chip-btn" id="clearBtn" type="button">清空</button>
        </div>
      </header>

      <section class="settings collapsed" id="settingsPanel">
        <div class="grid">
          <div class="row">
            <label for="apiBase">接口地址（默认当前域名）</label>
            <input id="apiBase" placeholder="https://your-domain.example" />
          </div>
          <div class="row">
            <label for="token">访问口令（不是上游 API Key）</label>
            <input id="token" type="password" placeholder="向你领取的口令" />
          </div>
          <div class="row">
            <label for="provider">上游提供商</label>
            <select id="provider">
              <option value="openai_compatible">OpenAI 兼容</option>
              <option value="anthropic">Anthropic 原生</option>
              <option value="gemini">Gemini 原生</option>
            </select>
          </div>
        </div>
        <div class="row">
          <label for="model">模型</label>
          <input id="model" placeholder="例如：qwen-plus / claude-3-7-sonnet" />
          <div class="hint" id="modelHint">可手动输入模型名，也可直接点下方表格选择。</div>
          <div class="model-table-wrap">
            <table class="model-table">
              <thead>
                <tr>
                  <th>模型</th>
                  <th>能力</th>
                  <th>状态</th>
                </tr>
              </thead>
              <tbody id="modelTableBody">
                <tr>
                  <td colspan="3">模型列表加载后可点击选择。</td>
                </tr>
              </tbody>
            </table>
          </div>
          <div class="hint" id="autoModelNotice"></div>
        </div>
        <div class="row">
          <div class="section-head">
            <label>历史会话（Cookie）</label>
          </div>
          <div class="history-list" id="historyList"></div>
          <div class="hint">支持新建与查看历史，超出容量时会自动裁剪旧内容。</div>
        </div>
      </section>

      <section class="chat-wrap">
        <section class="chat" id="chat"></section>
      </section>

      <section class="composer">
        <div class="row">
          <label for="input">输入</label>
          <textarea id="input" placeholder="输入你想问的问题"></textarea>
        </div>
        <div class="row">
          <div class="attach-head">
            <label for="fileInput">附件（图片/音频/视频/文件）</label>
            <button class="chip-btn tiny" id="pickFilesBtn" type="button">选择文件</button>
          </div>
          <input
            id="fileInput"
            type="file"
            multiple
            hidden
            accept="image/*,audio/*,video/*,.pdf,.txt,.md,.csv,.json,.doc,.docx,.xls,.xlsx"
          />
          <div class="hint" id="attachHint">单个文件不超过 20MB，最多 5 个。</div>
          <div class="attach-list" id="attachList"></div>
        </div>
        <div class="actions">
          <div class="status" id="status"></div>
          <button class="send-btn" id="sendBtn" type="button">发送</button>
        </div>
      </section>
    </main>

    <script>
      const MAX_FILE_COUNT = 5;
      const MAX_FILE_SIZE = 20 * 1024 * 1024;
      const MAX_TOTAL_SIZE = 80 * 1024 * 1024;
      const COOKIE_CHAT_HISTORY = "myai_chat_history";
      const COOKIE_ACTIVE_CHAT = "myai_active_chat";
      const COOKIE_MAX_BYTES = 3400;
      const MAX_CONVERSATION_COUNT = 8;
      const MAX_MESSAGES_PER_CONVERSATION = 24;

      const state = {
        messages: [],
        loading: false,
        pendingFiles: [],
        availableModels: [],
        conversations: [],
        activeConversationId: "",
      };

      const els = {
        appShell: document.getElementById("appShell"),
        authGate: document.getElementById("authGate"),
        authToken: document.getElementById("authToken"),
        authSubmit: document.getElementById("authSubmit"),
        authError: document.getElementById("authError"),
        settingsPanel: document.getElementById("settingsPanel"),
        settingsToggle: document.getElementById("settingsToggle"),
        newChatBtn: document.getElementById("newChatBtn"),
        historyList: document.getElementById("historyList"),
        apiBase: document.getElementById("apiBase"),
        token: document.getElementById("token"),
        provider: document.getElementById("provider"),
        model: document.getElementById("model"),
        modelTableBody: document.getElementById("modelTableBody"),
        modelHint: document.getElementById("modelHint"),
        autoModelNotice: document.getElementById("autoModelNotice"),
        chat: document.getElementById("chat"),
        input: document.getElementById("input"),
        pickFilesBtn: document.getElementById("pickFilesBtn"),
        fileInput: document.getElementById("fileInput"),
        attachList: document.getElementById("attachList"),
        attachHint: document.getElementById("attachHint"),
        sendBtn: document.getElementById("sendBtn"),
        clearBtn: document.getElementById("clearBtn"),
        status: document.getElementById("status"),
      };

      init();

      async function init() {
        els.apiBase.value = localStorage.getItem("myai_api_base") || "";
        els.token.value = "";
        els.provider.value = normalizeProvider(localStorage.getItem("myai_provider") || "openai_compatible");
        els.model.value = localStorage.getItem("myai_model") || "";

        const legacyToken = localStorage.getItem("myai_access_token") || "";
        if (legacyToken) {
          els.authToken.value = legacyToken;
          localStorage.removeItem("myai_access_token");
        }

        attachEvents();
        lockApp();
        restoreMessages();
        renderMessages();
        renderHistoryList();
        renderModelTable();
        renderPendingFiles();

        if ("serviceWorker" in navigator) {
          try {
            await navigator.serviceWorker.register("/sw.js");
          } catch {}
        }
      }

      function attachEvents() {
        els.authSubmit.addEventListener("click", onAuthSubmit);
        els.authToken.addEventListener("keydown", (e) => {
          if (e.key === "Enter") {
            e.preventDefault();
            onAuthSubmit();
          }
        });

        els.settingsToggle.addEventListener("click", () => {
          const collapsed = els.settingsPanel.classList.toggle("collapsed");
          els.settingsToggle.textContent = collapsed ? "设置" : "收起";
        });

        els.sendBtn.addEventListener("click", onSend);
        els.newChatBtn.addEventListener("click", onNewChat);
        els.clearBtn.addEventListener("click", onClear);
        els.pickFilesBtn.addEventListener("click", () => els.fileInput.click());
        els.fileInput.addEventListener("change", onPickFiles);
        els.attachList.addEventListener("click", onRemovePendingFile);
        els.historyList.addEventListener("click", onSwitchConversation);
        els.modelTableBody.addEventListener("click", onPickModelFromTable);

        els.apiBase.addEventListener("change", () => {
          localStorage.setItem("myai_api_base", els.apiBase.value.trim());
          if (isUnlocked()) loadModels();
        });

        els.token.addEventListener("change", () => {
          els.authToken.value = els.token.value.trim();
          if (!els.token.value.trim()) {
            lockApp("token 为空，请重新输入。");
            return;
          }
          if (isUnlocked()) loadModels();
        });

        els.provider.addEventListener("change", () => {
          const provider = normalizeProvider(els.provider.value);
          els.provider.value = provider;
          localStorage.setItem("myai_provider", provider);
          setAutoModelNotice("");
          if (isUnlocked()) loadModels();
        });

        els.model.addEventListener("change", () => {
          localStorage.setItem("myai_model", els.model.value.trim());
          setAutoModelNotice("");
          renderModelTable();
        });

        els.input.addEventListener("keydown", (e) => {
          if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            onSend();
          }
        });
      }

      async function onAuthSubmit() {
        if (state.loading) return;
        const token = (els.authToken.value || "").trim();
        if (!token) {
          lockApp("请输入访问 token。");
          return;
        }

        els.authSubmit.disabled = true;
        els.authSubmit.classList.add("loading");
        els.authError.textContent = "正在验证 token...";

        try {
          await verifyAccessToken(token);
          els.token.value = token;
          unlockApp();
          await loadModels();
          setStatus("口令验证成功。");
          els.input.focus();
        } catch (e) {
          lockApp(`验证失败：${e.message}`);
        } finally {
          els.authSubmit.disabled = false;
          els.authSubmit.classList.remove("loading");
          if (isUnlocked()) {
            els.authError.textContent = "";
          }
        }
      }

      function apiBase() {
        return (els.apiBase.value || "").trim() || location.origin;
      }

      function isUnlocked() {
        return els.authGate.hidden;
      }

      function lockApp(message = "") {
        els.appShell.classList.add("app-hidden");
        els.authGate.hidden = false;
        els.authError.textContent = message || "";
      }

      function unlockApp() {
        els.appShell.classList.remove("app-hidden");
        els.authGate.hidden = true;
        els.authError.textContent = "";
      }

      function selectedProvider() {
        const provider = normalizeProvider(els.provider.value);
        els.provider.value = provider;
        return provider;
      }

      function normalizeProvider(provider) {
        const p = String(provider || "").trim().toLowerCase();
        if (p === "anthropic") return "anthropic";
        if (p === "gemini") return "gemini";
        return "openai_compatible";
      }

      function providerLabel(provider) {
        if (provider === "anthropic") return "Anthropic 原生";
        if (provider === "gemini") return "Gemini 原生";
        return "OpenAI 兼容";
      }

      function modelHintText(provider, source, hasModels) {
        if (source === "allowlist") {
          return `当前为服务端白名单模式（${providerLabel(provider)}），仅可用列表内模型。`;
        }
        if (hasModels) {
          return `已拉取 ${providerLabel(provider)} 的模型列表，可直接在表格中点击选择。`;
        }
        return `${providerLabel(provider)} 模型列表为空，可手动输入模型名。`;
      }

      async function verifyAccessToken(token) {
        const provider = selectedProvider();
        const query = new URLSearchParams({ provider }).toString();
        let resp;
        let data = {};
        try {
          resp = await fetch(`${apiBase()}/api/models?${query}`, {
            headers: token ? { "X-Client-Token": token } : {},
          });
        } catch {
          throw new Error("无法连接服务端");
        }
        try {
          data = await resp.json();
        } catch {}
        if (!resp.ok) {
          throw new Error(data.error || "token 不可用");
        }
      }

      async function loadModels() {
        setStatus("正在加载模型列表...");
        const provider = selectedProvider();
        try {
          const query = new URLSearchParams({ provider }).toString();
          const resp = await fetch(`${apiBase()}/api/models?${query}`, {
            headers: tokenHeaders(),
          });
          const data = await resp.json();
          if (!resp.ok) throw new Error(data.error || "加载失败");

          const models = Array.isArray(data.models) ? data.models : [];
          state.availableModels = models.slice();

          if (!els.model.value && models.length) {
            els.model.value = models[0];
            localStorage.setItem("myai_model", els.model.value);
          }

          els.modelHint.textContent = modelHintText(provider, data.source, models.length > 0);
          renderModelTable();

          if (els.model.value) {
            setStatus("模型已就绪。");
          } else {
            setStatus("请手动输入模型名后发送。");
          }
        } catch (e) {
          state.availableModels = [];
          els.modelHint.textContent = `${providerLabel(provider)} 模型列表加载失败时，也可以手动输入模型名。`;
          renderModelTable();
          setStatus(`模型加载失败：${e.message}`, true);
        }
      }

      function renderModelTable() {
        const selectedModel = (els.model.value || "").trim();
        els.modelTableBody.innerHTML = "";

        if (!state.availableModels.length) {
          const tr = document.createElement("tr");
          const td = document.createElement("td");
          td.colSpan = 3;
          td.textContent = "暂无模型列表，可手动输入模型名。";
          tr.appendChild(td);
          els.modelTableBody.appendChild(tr);
          return;
        }

        for (const model of state.availableModels) {
          const tr = document.createElement("tr");
          tr.className = "model-row";
          tr.dataset.model = model;
          if (model === selectedModel) tr.classList.add("active");

          const nameTd = document.createElement("td");
          nameTd.textContent = model;

          const capsTd = document.createElement("td");
          const capsWrap = document.createElement("div");
          capsWrap.className = "cap-list";
          const caps = detectModelCapabilities(model);
          const capNames = [];
          if (caps.image) capNames.push("图像");
          if (caps.audio) capNames.push("音频");
          if (caps.video) capNames.push("视频");
          if (caps.file) capNames.push("文件");
          if (!capNames.length) capNames.push("文本");
          for (const cap of capNames) {
            const chip = document.createElement("span");
            chip.className = "cap-chip";
            chip.textContent = cap;
            capsWrap.appendChild(chip);
          }
          capsTd.appendChild(capsWrap);

          const stateTd = document.createElement("td");
          stateTd.textContent = model === selectedModel ? "当前" : "点击选择";

          tr.appendChild(nameTd);
          tr.appendChild(capsTd);
          tr.appendChild(stateTd);
          els.modelTableBody.appendChild(tr);
        }
      }

      function onPickModelFromTable(e) {
        const row = e.target.closest("tr[data-model]");
        if (!row) return;
        const model = (row.dataset.model || "").trim();
        if (!model) return;
        els.model.value = model;
        localStorage.setItem("myai_model", model);
        setAutoModelNotice("");
        renderModelTable();
      }

      async function onPickFiles() {
        const picked = Array.from(els.fileInput.files || []);
        els.fileInput.value = "";
        if (!picked.length) return;

        const warnings = [];
        let added = 0;

        for (const file of picked) {
          if (state.pendingFiles.length >= MAX_FILE_COUNT) {
            warnings.push(`最多添加 ${MAX_FILE_COUNT} 个附件。`);
            break;
          }

          if (file.size > MAX_FILE_SIZE) {
            warnings.push(`已跳过 ${file.name}，单文件不能超过 ${formatBytes(MAX_FILE_SIZE)}。`);
            continue;
          }

          const projectedTotal = pendingTotalSize() + file.size;
          if (projectedTotal > MAX_TOTAL_SIZE) {
            warnings.push(`附件总大小不能超过 ${formatBytes(MAX_TOTAL_SIZE)}。`);
            break;
          }

          let dataUrl = "";
          try {
            dataUrl = await readFileAsDataUrl(file);
          } catch {
            warnings.push(`读取失败：${file.name}`);
            continue;
          }

          const mimeType = file.type || inferMimeType(file.name);
          state.pendingFiles.push({
            id: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
            name: file.name || "unnamed",
            size: file.size,
            mimeType,
            dataUrl,
          });
          added += 1;
        }

        renderPendingFiles();
        if (warnings.length) {
          setStatus(warnings.join(" "), true);
        } else if (added > 0) {
          setStatus(`已添加 ${added} 个附件。`);
        }
      }

      function onRemovePendingFile(e) {
        const btn = e.target.closest("button[data-remove-index]");
        if (!btn) return;

        const idx = Number(btn.dataset.removeIndex);
        if (!Number.isInteger(idx) || idx < 0 || idx >= state.pendingFiles.length) return;
        state.pendingFiles.splice(idx, 1);
        renderPendingFiles();
      }

      async function onSend() {
        if (state.loading) return;
        if (!isUnlocked()) {
          setStatus("请先输入 token 后再发送。", true);
          return;
        }

        const text = els.input.value.trim();
        const selectedModel = els.model.value.trim();
        const provider = selectedProvider();
        if (!(els.token.value || "").trim()) {
          setStatus("缺少访问 token。", true);
          return;
        }
        if (!text && !state.pendingFiles.length) return;
        if (!selectedModel) {
          setStatus("请先输入模型名。", true);
          return;
        }

        const modelDecision = chooseModelForAttachments(selectedModel, state.pendingFiles, state.availableModels, provider);
        const modelToUse = modelDecision.model;
        localStorage.setItem("myai_model", modelToUse);
        if (modelDecision.switched) {
          els.model.value = modelToUse;
          const notice = `检测到${modelDecision.reasonLabel}，已自动切换模型：${selectedModel} -> ${modelToUse}`;
          setAutoModelNotice(notice);
          setStatus(notice);
          renderModelTable();
        } else {
          setAutoModelNotice("");
        }

        const userMessage = {
          role: "user",
          content: buildUserContent(text, state.pendingFiles),
        };
        state.messages.push(userMessage);

        els.input.value = "";
        state.pendingFiles = [];
        els.fileInput.value = "";
        renderPendingFiles();
        saveMessages();
        renderMessages();

        state.loading = true;
        els.sendBtn.disabled = true;
        els.sendBtn.classList.add("loading");
        setStatus("思考中...");

        try {
          const resp = await fetch(`${apiBase()}/api/chat`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              ...tokenHeaders(),
            },
            body: JSON.stringify({
              provider,
              model: modelToUse,
              messages: state.messages,
            }),
          });

          const data = await resp.json();
          if (!resp.ok) throw new Error(data.error || "请求失败");

          state.messages.push(normalizeAssistantMessage(data));
          saveMessages();
          renderMessages();
          setStatus("完成");
        } catch (e) {
          setStatus(`发送失败：${e.message}`, true);
        } finally {
          state.loading = false;
          els.sendBtn.disabled = false;
          els.sendBtn.classList.remove("loading");
        }
      }

      function onClear() {
        state.messages = [];
        state.pendingFiles = [];
        els.fileInput.value = "";
        setAutoModelNotice("");
        saveMessages();
        renderMessages();
        renderPendingFiles();
        setStatus("已清空会话。");
      }

      function onNewChat() {
        const current = getActiveConversation();
        if (current) {
          current.messages = state.messages.slice(-MAX_MESSAGES_PER_CONVERSATION).map(compactMessage).filter(Boolean);
          current.updatedAt = Date.now();
          const title = buildConversationTitle(state.messages);
          if (title) current.title = title;
        }

        const conv = {
          id: createConversationId(),
          title: "新会话",
          updatedAt: Date.now(),
          messages: [],
        };
        state.conversations.unshift(conv);
        state.activeConversationId = conv.id;
        state.messages = [];
        state.pendingFiles = [];
        els.input.value = "";
        els.fileInput.value = "";
        setAutoModelNotice("");
        saveMessages();
        renderMessages();
        renderPendingFiles();
        renderHistoryList();
        setStatus("已新建会话。");
      }

      function onSwitchConversation(e) {
        const btn = e.target.closest("button[data-conversation-id]");
        if (!btn) return;
        const id = btn.dataset.conversationId;
        if (!id || id === state.activeConversationId) return;

        const current = getActiveConversation();
        if (current) {
          current.messages = state.messages.slice(-MAX_MESSAGES_PER_CONVERSATION).map(compactMessage).filter(Boolean);
          current.updatedAt = Date.now();
          const title = buildConversationTitle(state.messages);
          if (title) current.title = title;
        }

        const next = state.conversations.find((c) => c.id === id);
        if (!next) return;
        state.activeConversationId = next.id;
        state.messages = (next.messages || [])
          .map((m) => ({
            role: m.role === "assistant" ? "assistant" : "user",
            content: normalizeMessageContent(m.content),
          }))
          .filter(Boolean);
        state.pendingFiles = [];
        els.fileInput.value = "";
        saveMessages();
        renderMessages();
        renderPendingFiles();
        renderHistoryList();
      }

      function tokenHeaders() {
        const token = (els.token.value || "").trim();
        return token ? { "X-Client-Token": token } : {};
      }

      function setStatus(text, isError = false) {
        els.status.textContent = text;
        els.status.classList.toggle("error", !!isError);
      }

      function setAutoModelNotice(text) {
        els.autoModelNotice.textContent = text || "";
      }

      function chooseModelForAttachments(currentModel, files, availableModels, provider) {
        const requirement = detectAttachmentRequirement(files);
        if (!requirement.need) {
          return { model: currentModel, switched: false, reasonLabel: "" };
        }

        if (modelSupportsRequirement(currentModel, requirement.need)) {
          return { model: currentModel, switched: false, reasonLabel: requirement.label };
        }

        const candidates = uniqueModels([
          ...(Array.isArray(availableModels) ? availableModels : []),
          currentModel,
          ...fallbackModelsByRequirement(requirement.need, provider),
        ]);

        const best = pickBestModelForRequirement(candidates, requirement.need);
        if (!best || best === currentModel) {
          return { model: currentModel, switched: false, reasonLabel: requirement.label };
        }

        return { model: best, switched: true, reasonLabel: requirement.label };
      }

      function detectAttachmentRequirement(files) {
        const list = Array.isArray(files) ? files : [];
        const hasVideo = list.some((f) => isVideoMime(f?.mimeType));
        if (hasVideo) return { need: "video", label: "视频附件" };

        const hasAudio = list.some((f) => isAudioMime(f?.mimeType));
        if (hasAudio) return { need: "audio", label: "音频附件" };

        const hasImage = list.some((f) => isImageMime(f?.mimeType));
        if (hasImage) return { need: "image", label: "图片附件" };

        const hasFile = list.some((f) => !isImageMime(f?.mimeType) && !isAudioMime(f?.mimeType) && !isVideoMime(f?.mimeType));
        if (hasFile) return { need: "file", label: "文件附件" };

        return { need: "", label: "" };
      }

      function modelSupportsRequirement(modelName, requirement) {
        if (!modelName) return false;
        const caps = detectModelCapabilities(modelName);
        if (requirement === "video") return caps.video;
        if (requirement === "audio") return caps.audio;
        if (requirement === "image") return caps.image;
        if (requirement === "file") return caps.file;
        return true;
      }

      function detectModelCapabilities(modelName) {
        const m = String(modelName || "").toLowerCase();
        const image =
          /vision|vl|4o|4\.1|omni|gemini|claude|pixtral|glm-4v|llava|internvl|qvq|qwen-vl|grok-vision/.test(m);
        const audio = /audio|speech|voice|4o|omni|gemini|qwen-audio|whisper/.test(m);
        const video = /video|gemini|qwen-vl|max|omni|4o|4\.1/.test(m);
        const file = image || /file|pdf|doc|document|long|gemini|claude|4o|4\.1|qwen-long/.test(m);
        return { image, audio, video, file };
      }

      function fallbackModelsByRequirement(requirement, provider) {
        const p = normalizeProvider(provider);
        if (p === "anthropic") {
          if (requirement === "image") return ["claude-3-7-sonnet", "claude-3-5-sonnet", "claude-3-opus"];
          if (requirement === "file") return ["claude-3-7-sonnet", "claude-3-5-sonnet", "claude-3-opus"];
          if (requirement === "audio" || requirement === "video") return ["claude-3-7-sonnet", "claude-3-5-sonnet"];
          return [];
        }
        if (p === "gemini") {
          if (requirement === "video") return ["gemini-2.0-flash", "gemini-1.5-pro"];
          if (requirement === "audio") return ["gemini-2.0-flash", "gemini-1.5-pro"];
          if (requirement === "image") return ["gemini-2.0-flash", "gemini-1.5-pro"];
          if (requirement === "file") return ["gemini-2.0-flash", "gemini-1.5-pro"];
          return [];
        }
        if (requirement === "video") {
          return ["gemini-2.0-flash", "gemini-1.5-pro", "qwen-vl-max", "gpt-4.1"];
        }
        if (requirement === "audio") {
          return ["gpt-4o-audio-preview", "gpt-4o-mini-audio-preview", "qwen-audio", "gemini-2.0-flash"];
        }
        if (requirement === "image") {
          return ["gpt-4.1", "gpt-4o", "qwen-vl-plus", "gemini-2.0-flash", "claude-3-7-sonnet"];
        }
        if (requirement === "file") {
          return ["gpt-4.1", "gpt-4o", "claude-3-7-sonnet", "gemini-2.0-flash"];
        }
        return [];
      }

      function pickBestModelForRequirement(models, requirement) {
        let best = "";
        let bestScore = -1;
        for (const model of models) {
          const score = scoreModelForRequirement(model, requirement);
          if (score > bestScore) {
            bestScore = score;
            best = model;
          }
        }
        return best;
      }

      function scoreModelForRequirement(model, requirement) {
        if (!model || !modelSupportsRequirement(model, requirement)) return -1;
        const m = model.toLowerCase();

        const rank = (patterns) => {
          const idx = patterns.findIndex((p) => p.test(m));
          return idx === -1 ? 0 : patterns.length - idx;
        };

        if (requirement === "video") {
          return 100 + rank([/video/, /gemini/, /qwen-vl/, /vl/, /4\.1/, /4o/]);
        }
        if (requirement === "audio") {
          return 100 + rank([/audio/, /speech/, /voice/, /4o/, /gemini/, /qwen-audio/]);
        }
        if (requirement === "image") {
          return 100 + rank([/vision/, /vl/, /4\.1/, /4o/, /gemini/, /claude/, /pixtral/]);
        }
        if (requirement === "file") {
          return 100 + rank([/file/, /pdf/, /doc/, /long/, /4\.1/, /4o/, /gemini/, /claude/]);
        }
        return 1;
      }

      function uniqueModels(models) {
        return [...new Set((models || []).map((m) => String(m || "").trim()).filter(Boolean))];
      }

      function renderPendingFiles() {
        els.attachList.innerHTML = "";
        els.attachHint.textContent = `单个文件不超过 ${formatBytes(MAX_FILE_SIZE)}，最多 ${MAX_FILE_COUNT} 个，总计不超过 ${formatBytes(MAX_TOTAL_SIZE)}。`;
        for (let i = 0; i < state.pendingFiles.length; i += 1) {
          const file = state.pendingFiles[i];
          const item = document.createElement("div");
          item.className = "attach-item";

          item.appendChild(buildPendingPreview(file));

          const meta = document.createElement("div");
          meta.className = "file-meta";
          const name = document.createElement("div");
          name.className = "file-name";
          name.textContent = file.name;
          const sub = document.createElement("div");
          sub.className = "file-sub";
          sub.textContent = `${file.mimeType || "unknown"} · ${formatBytes(file.size)}`;
          meta.appendChild(name);
          meta.appendChild(sub);
          item.appendChild(meta);

          const remove = document.createElement("button");
          remove.type = "button";
          remove.className = "file-remove";
          remove.dataset.removeIndex = String(i);
          remove.textContent = "移除";
          item.appendChild(remove);

          els.attachList.appendChild(item);
        }
      }

      function buildPendingPreview(file) {
        if (isImageMime(file.mimeType)) {
          const img = document.createElement("img");
          img.className = "preview-thumb";
          img.alt = file.name;
          img.src = file.dataUrl;
          return img;
        }

        const chip = document.createElement("div");
        chip.className = "preview-chip";
        if (isAudioMime(file.mimeType)) {
          chip.textContent = "AUDIO";
        } else if (isVideoMime(file.mimeType)) {
          chip.textContent = "VIDEO";
        } else {
          chip.textContent = "FILE";
        }
        return chip;
      }

      function renderMessages() {
        els.chat.innerHTML = "";

        if (!state.messages.length) {
          const empty = document.createElement("div");
          empty.className = "msg assistant msg-empty";
          empty.textContent = "你好，我可以帮你解答问题。";
          els.chat.appendChild(empty);
          return;
        }

        for (const msg of state.messages) {
          const roleClass = msg.role === "user" ? "user" : "assistant";
          const row = document.createElement("div");
          row.className = `msg-row ${roleClass}`;

          const avatar = document.createElement("div");
          avatar.className = `msg-avatar ${roleClass}`;
          avatar.textContent = roleClass === "user" ? "我" : "AI";

          const bubble = document.createElement("div");
          bubble.className = `msg ${roleClass}`;
          renderMessageContent(bubble, msg.content);

          if (roleClass === "user") {
            row.appendChild(bubble);
            row.appendChild(avatar);
          } else {
            row.appendChild(avatar);
            row.appendChild(bubble);
          }

          els.chat.appendChild(row);
        }

        els.chat.scrollTop = els.chat.scrollHeight;
      }

      function renderMessageContent(container, content) {
        if (typeof content === "string") {
          appendText(container, content);
          return;
        }

        if (!Array.isArray(content)) {
          appendText(container, stringifyUnknown(content));
          return;
        }

        if (!content.length) {
          appendText(container, "(空消息)");
          return;
        }

        for (const part of content) {
          appendPart(container, part);
        }
      }

      function appendPart(container, part) {
        if (typeof part === "string") {
          appendText(container, part);
          return;
        }
        if (!part || typeof part !== "object") {
          appendText(container, stringifyUnknown(part));
          return;
        }

        if (part.type === "text" || part.type === "output_text" || typeof part.text === "string") {
          appendText(container, part.text || "");
          return;
        }

        if (part.type === "image_url" && part.image_url?.url) {
          appendImage(container, part.image_url.url);
          return;
        }

        if (part.type === "input_audio" && part.input_audio?.data) {
          const format = normalizeAudioFormat(part.input_audio.format || "mp3");
          appendAudio(container, `data:audio/${format};base64,${part.input_audio.data}`);
          return;
        }

        if (part.type === "file_url" && part.file_url?.url) {
          appendFile(container, part.file_url.url, part.file_url.media_type, part.file_url.filename);
          return;
        }

        appendText(container, stringifyUnknown(part));
      }

      function appendText(container, text) {
        const line = document.createElement("div");
        line.textContent = text || "";
        container.appendChild(line);
      }

      function appendImage(container, url) {
        if (!isRenderableUrl(url)) {
          appendText(container, "[图片附件]");
          return;
        }
        const box = document.createElement("div");
        box.className = "msg-media";
        const img = document.createElement("img");
        img.alt = "image";
        img.loading = "lazy";
        img.src = url;
        box.appendChild(img);
        container.appendChild(box);
      }

      function appendAudio(container, url) {
        if (!isRenderableUrl(url)) {
          appendText(container, "[音频附件]");
          return;
        }
        const box = document.createElement("div");
        box.className = "msg-media";
        const audio = document.createElement("audio");
        audio.controls = true;
        audio.preload = "metadata";
        audio.src = url;
        box.appendChild(audio);
        container.appendChild(box);
      }

      function appendVideo(container, url) {
        if (!isRenderableUrl(url)) {
          appendText(container, "[视频附件]");
          return;
        }
        const box = document.createElement("div");
        box.className = "msg-media";
        const video = document.createElement("video");
        video.controls = true;
        video.preload = "metadata";
        video.src = url;
        box.appendChild(video);
        container.appendChild(box);
      }

      function appendFile(container, url, mediaType, filename) {
        const type = mediaType || inferMimeType(filename || "");
        if (isImageMime(type)) {
          appendImage(container, url);
          return;
        }
        if (isAudioMime(type)) {
          appendAudio(container, url);
          return;
        }
        if (isVideoMime(type)) {
          appendVideo(container, url);
          return;
        }

        const label = filename ? `附件：${filename}` : "附件文件";
        if (!isRenderableUrl(url)) {
          appendText(container, label);
          return;
        }
        const link = document.createElement("a");
        link.className = "file-link";
        link.href = url;
        link.textContent = label;
        link.target = "_blank";
        link.rel = "noopener noreferrer";
        link.download = filename || "";
        container.appendChild(link);
      }

      function buildUserContent(text, files) {
        if (!files.length) return text;

        const parts = [];
        if (text) {
          parts.push({ type: "text", text });
        }

        for (const file of files) {
          if (!isImageMime(file.mimeType)) {
            parts.push({
              type: "text",
              text: `[附件] ${file.name} (${file.mimeType || "unknown"}, ${formatBytes(file.size)})`,
            });
          }
          parts.push(buildPartFromFile(file));
        }
        return parts;
      }

      function buildPartFromFile(file) {
        if (isImageMime(file.mimeType)) {
          return {
            type: "image_url",
            image_url: {
              url: file.dataUrl,
            },
          };
        }

        if (isAudioMime(file.mimeType)) {
          const parsed = parseDataUrl(file.dataUrl);
          if (parsed.base64) {
            return {
              type: "input_audio",
              input_audio: {
                data: parsed.base64,
                format: normalizeAudioFormat(file.mimeType.split("/")[1] || "mp3"),
              },
            };
          }
        }

        return {
          type: "file_url",
          file_url: {
            url: file.dataUrl,
            media_type: file.mimeType || "application/octet-stream",
            filename: file.name,
          },
        };
      }

      function normalizeAssistantMessage(data) {
        if (data?.message && typeof data.message === "object") {
          return {
            role: "assistant",
            content: normalizeMessageContent(data.message.content),
          };
        }
        return {
          role: "assistant",
          content: normalizeMessageContent(data?.content),
        };
      }

      function normalizeMessageContent(content) {
        if (typeof content === "string") {
          return content || "(空回复)";
        }
        if (Array.isArray(content)) {
          return content;
        }
        if (content == null) {
          return "(空回复)";
        }
        if (typeof content === "object") {
          if (typeof content.text === "string") return content.text;
          return stringifyUnknown(content);
        }
        return String(content);
      }

      function saveMessages() {
        const compact = state.messages.slice(-30).map(compactMessage);
        localStorage.setItem("myai_messages", JSON.stringify(compact));
      }

      function compactMessage(msg) {
        if (!msg || typeof msg !== "object") return null;
        return {
          role: msg.role === "assistant" ? "assistant" : "user",
          content: compactContent(msg.content),
        };
      }

      function compactContent(content) {
        if (typeof content === "string") {
          return truncate(content, 4000);
        }
        if (!Array.isArray(content)) {
          return truncate(stringifyUnknown(content), 2000);
        }
        return content
          .map((part) => {
            if (typeof part === "string") {
              return { type: "text", text: truncate(part, 1000) };
            }
            if (!part || typeof part !== "object") return null;
            if (part.type === "text" || part.type === "output_text" || typeof part.text === "string") {
              return { type: "text", text: truncate(part.text || "", 1200) };
            }
            if (part.type === "image_url") {
              return { type: "text", text: "[图片附件已省略，刷新后不可重复发送]" };
            }
            if (part.type === "input_audio") {
              return { type: "text", text: "[音频附件已省略，刷新后不可重复发送]" };
            }
            if (part.type === "file_url") {
              const name = part.file_url?.filename || "";
              return { type: "text", text: `[文件附件已省略，刷新后不可重复发送] ${name}`.trim() };
            }
            return { type: "text", text: truncate(stringifyUnknown(part), 800) };
          })
          .filter(Boolean);
      }

      function restoreMessages() {
        try {
          const v = localStorage.getItem("myai_messages");
          const parsed = v ? JSON.parse(v) : [];
          state.messages = Array.isArray(parsed)
            ? parsed
                .map((m) => {
                  if (!m || typeof m !== "object") return null;
                  return {
                    role: m.role === "assistant" ? "assistant" : "user",
                    content: normalizeMessageContent(m.content),
                  };
                })
                .filter(Boolean)
            : [];
        } catch {
          state.messages = [];
        }
      }

      function pendingTotalSize() {
        return state.pendingFiles.reduce((sum, file) => sum + (file.size || 0), 0);
      }

      function readFileAsDataUrl(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(String(reader.result || ""));
          reader.onerror = () => reject(new Error("read failed"));
          reader.readAsDataURL(file);
        });
      }

      function parseDataUrl(url) {
        if (typeof url !== "string" || !url.startsWith("data:")) return { mime: "", base64: "" };
        const comma = url.indexOf(",");
        if (comma === -1) return { mime: "", base64: "" };
        const meta = url.slice(5, comma);
        const mime = meta.split(";")[0] || "";
        const base64 = meta.includes(";base64") ? url.slice(comma + 1) : "";
        return { mime, base64 };
      }

      function normalizeAudioFormat(format) {
        const f = String(format || "").toLowerCase();
        if (f === "mpeg") return "mp3";
        if (f === "wave") return "wav";
        if (f === "x-wav") return "wav";
        if (f === "quicktime") return "mov";
        return f || "mp3";
      }

      function inferMimeType(name) {
        const n = String(name || "").toLowerCase();
        if (n.endsWith(".png")) return "image/png";
        if (n.endsWith(".jpg") || n.endsWith(".jpeg")) return "image/jpeg";
        if (n.endsWith(".webp")) return "image/webp";
        if (n.endsWith(".gif")) return "image/gif";
        if (n.endsWith(".mp3")) return "audio/mp3";
        if (n.endsWith(".wav")) return "audio/wav";
        if (n.endsWith(".m4a")) return "audio/m4a";
        if (n.endsWith(".mp4")) return "video/mp4";
        if (n.endsWith(".mov")) return "video/quicktime";
        if (n.endsWith(".pdf")) return "application/pdf";
        return "application/octet-stream";
      }

      function isImageMime(mime) {
        return String(mime || "").startsWith("image/");
      }

      function isAudioMime(mime) {
        return String(mime || "").startsWith("audio/");
      }

      function isVideoMime(mime) {
        return String(mime || "").startsWith("video/");
      }

      function isRenderableUrl(url) {
        return typeof url === "string" && (url.startsWith("data:") || /^https?:\/\//.test(url));
      }

      function formatBytes(size) {
        const n = Number(size || 0);
        if (!Number.isFinite(n) || n <= 0) return "0 B";
        if (n < 1024) return `${n} B`;
        const units = ["KB", "MB", "GB"];
        let value = n / 1024;
        let idx = 0;
        while (value >= 1024 && idx < units.length - 1) {
          value /= 1024;
          idx += 1;
        }
        return `${value.toFixed(value >= 10 || idx === 0 ? 1 : 2)} ${units[idx]}`;
      }

      function truncate(text, maxLen) {
        const t = String(text || "");
        return t.length <= maxLen ? t : `${t.slice(0, maxLen)}...`;
      }

      function stringifyUnknown(value) {
        if (value == null) return "";
        if (typeof value === "string") return value;
        try {
          return JSON.stringify(value);
        } catch {
          return String(value);
        }
      }
    </script>
  </body>
</html>
